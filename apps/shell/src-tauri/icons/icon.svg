<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="siri" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E64DC"/>
      <stop offset="45%" stop-color="#6428C8"/>
      <stop offset="100%" stop-color="#DC2864"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.38" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="80%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.08"/>
    </radialGradient>
    <clipPath id="squircle">
      <rect width="1024" height="1024" rx="228"/>
    </clipPath>
  </defs>
  <g clip-path="url(#squircle)">
    <!-- White background -->
    <rect width="1024" height="1024" fill="#FAFAFA"/>
    <!-- Subtle ambient glow behind the orb -->
    <circle cx="512" cy="520" r="400" fill="#6428C8" opacity="0.04"/>
    <!-- Outer pulse ring -->
    <circle cx="512" cy="512" r="340" fill="none" stroke="url(#siri)" stroke-width="2.5" opacity="0.2"/>
    <!-- Inner pulse ring -->
    <circle cx="512" cy="512" r="300" fill="none" stroke="url(#siri)" stroke-width="1.5" opacity="0.1"/>
    <!-- Main Siri gradient orb -->
    <circle cx="512" cy="512" r="240" fill="url(#siri)"/>
    <!-- Specular highlight for depth -->
    <circle cx="512" cy="512" r="240" fill="url(#glow)"/>
    <!-- Subtle edge shadow -->
    <circle cx="512" cy="512" r="240" fill="url(#shadow)"/>
  </g>
</svg>
