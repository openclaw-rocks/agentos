apiVersion: apps/v1
kind: Deployment
metadata:
  name: shell
  labels:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/component: shell
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agentos
      app.kubernetes.io/component: shell
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentos
        app.kubernetes.io/component: shell
    spec:
      containers:
        - name: shell
          image: ghcr.io/openclawrocks/shell-hosted:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: shell
  labels:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/component: shell
spec:
  selector:
    app.kubernetes.io/name: agentos
    app.kubernetes.io/component: shell
  ports:
    - port: 80
      targetPort: http
      name: http
