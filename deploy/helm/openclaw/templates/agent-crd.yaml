apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawagents.openclaw.rocks
  labels:
    app.kubernetes.io/name: openclaw
spec:
  group: openclaw.rocks
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - agentName
                - image
              properties:
                agentName:
                  type: string
                  description: Name of the agent (e.g., "k8s-operator", "assistant")
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                    tag:
                      type: string
                      default: latest
                replicas:
                  type: integer
                  minimum: 0
                  default: 1
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                healthCheck:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    path:
                      type: string
                      default: /health
                    port:
                      type: integer
                      default: 8080
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Failed
                    - Stopped
                readyReplicas:
                  type: integer
                lastHeartbeat:
                  type: string
                  format: date-time
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agent
          type: string
          jsonPath: .spec.agentName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: openclawagents
    singular: openclawagent
    kind: OpenClawAgent
    shortNames:
      - oca
