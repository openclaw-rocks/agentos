# Default values for openclaw

# Synapse homeserver configuration
synapse:
  enabled: true
  image:
    repository: matrixdotorg/synapse
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  serverName: openclaw.local
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  service:
    type: ClusterIP
    port: 8008

# Runtime — agent orchestration service
runtime:
  image:
    repository: ghcr.io/openclawrocks/runtime
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 9000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    HOMESERVER_URL: http://synapse:8008
    AGENT_PREFIX: agent-
  service:
    type: ClusterIP
    port: 9000

# Shell — static web app
shell:
  image:
    repository: ghcr.io/openclawrocks/shell
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80

# Agent defaults — shared configuration for all agent deployments
agentDefaults:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthCheck:
    enabled: true
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  image:
    pullPolicy: IfNotPresent

# List of agents to deploy
agents: []
